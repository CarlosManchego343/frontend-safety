<div class="capacitaciones-container">

  <!-- Header -->
  <div class="header">
    <h1>📚 Capacitaciones SG-SST</h1>

    <div class="actions">
      <button class="btn-back" (click)="volver()">
        ⬅ Volver al Dashboard
      </button>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid">

    <div class="card" *ngFor="let c of capacitaciones">

      <h2>{{ c.nombre }}</h2>

      <p class="descripcion">
        {{ c.descripcion }}
      </p>

      <span class="estado">
        Programada
      </span>

      <div class="fecha">
        📅 {{ c.fecha | date:'dd/MM/yyyy' }}
      </div>

    </div>

    <!-- Empty state -->
    <div *ngIf="capacitaciones.length === 0" class="card empty">
      ⚠️ No hay capacitaciones registradas
    </div>

  </div>

</div>
